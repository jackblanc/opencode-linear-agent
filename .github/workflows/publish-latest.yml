name: Publish Latest

on:
  push:
    branches:
      - master

permissions:
  contents: read
  id-token: write

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run checks
        run: bun run check

  publish-plugin:
    name: Publish plugin latest
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Set canary version
        working-directory: packages/plugin
        run: |
          base="$(node -p 'require("./package.json").version.split("-")[0]')"
          v="${base}-master.${GITHUB_RUN_NUMBER}"
          node -e "const fs=require('node:fs'); const p='package.json'; const j=JSON.parse(fs.readFileSync(p,'utf8')); j.version='${v}'; fs.writeFileSync(p, JSON.stringify(j, null, 2)+'\\n');"
      - name: Publish plugin (latest)
        working-directory: packages/plugin
        run: npm publish --access public --tag latest --provenance

  publish-server:
    name: Publish server latest
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Set canary version
        working-directory: packages/server
        run: |
          base="$(node -p 'require("./package.json").version.split("-")[0]')"
          v="${base}-master.${GITHUB_RUN_NUMBER}"
          node -e "const fs=require('node:fs'); const p='package.json'; const j=JSON.parse(fs.readFileSync(p,'utf8')); j.version='${v}'; fs.writeFileSync(p, JSON.stringify(j, null, 2)+'\\n');"
      - name: Publish server (latest)
        working-directory: packages/server
        run: npm publish --access public --tag latest --provenance
