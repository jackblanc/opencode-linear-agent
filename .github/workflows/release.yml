name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Verify tag matches package versions
        run: |
          tag="${GITHUB_REF_NAME#v}"
          root="$(node -e 'console.log(require("./package.json").version)')"
          plugin="$(node -e 'console.log(require("./packages/plugin/package.json").version)')"
          server="$(node -e 'console.log(require("./packages/server/package.json").version)')"
          core="$(node -e 'console.log(require("./packages/core/package.json").version)')"

          if [ "$tag" != "$root" ] || [ "$tag" != "$plugin" ] || [ "$tag" != "$server" ] || [ "$tag" != "$core" ]; then
            echo "Tag version mismatch"
            echo "tag=$tag root=$root plugin=$plugin server=$server core=$core"
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Run checks
        run: bun run check

  build-server:
    name: Build server (${{ matrix.suffix }})
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: bun-linux-x64
            suffix: linux-x64
          - runner: ubuntu-latest
            target: bun-linux-arm64
            suffix: linux-arm64
          - runner: macos-14
            target: bun-darwin-arm64
            suffix: darwin-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build standalone server binary
        run: mkdir -p dist && bun build ./packages/server/src/index.ts --compile --target=${{ matrix.target }} --outfile=dist/opencode-linear-agent-server-${{ matrix.suffix }}
      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.suffix }}
          path: dist/opencode-linear-agent-server-${{ matrix.suffix }}

  publish-plugin:
    name: Publish plugin to npm
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Publish plugin (latest)
        working-directory: packages/plugin
        run: npm publish --access public --tag stable --provenance

  publish-server:
    name: Publish server to npm
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Publish server (latest)
        working-directory: packages/server
        run: npm publish --access public --tag stable --provenance

  github-release:
    name: Publish GitHub release assets
    needs: [build-server, publish-plugin, publish-server]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: server-*
          merge-multiple: true
      - name: Generate checksums
        run: cd dist && sha256sum opencode-linear-agent-server-* > SHA256SUMS
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/opencode-linear-agent-server-*
            dist/SHA256SUMS
