services:
  # Linear webhook server - handles OAuth and webhooks from Linear
  linear-webhook:
    build:
      context: .
      dockerfile: packages/local/Dockerfile
    ports:
      - "3000:3000" # Local access only
    volumes:
      # Mount config file (use config.docker.json for Docker networking)
      - ./config.docker.json:/app/packages/local/config.json:ro
      # Persist data (tokens, sessions)
      - linear-data:/data
      # Mount local repo for git operations (read-write for worktree creation)
      - ${REPO_PATH:-~/projects/reservations}:/workspace/repo
      # Worktrees directory for session isolation
      - worktrees:/workspace/worktrees
    environment:
      - NODE_ENV=production
    depends_on:
      - opencode
    networks:
      - linear-agent

  # OpenCode server - AI coding agent (internal only, not exposed publicly)
  opencode:
    build:
      context: ./docker/opencode
      dockerfile: Dockerfile
    ports:
      - "4096:4096" # Expose for local debugging
    volumes:
      # Mount worktrees at same path as linear-webhook for consistency
      - worktrees:/workspace/worktrees
      # Mount local repo as reference (read-write for git operations)
      - ${REPO_PATH:-~/projects/reservations}:/workspace/repo
      # Persistent storage for OpenCode data (logs, sessions, etc.)
      - opencode-data:/root/.local/share/opencode
    environment:
      # Optional: Anthropic API key (not needed if using Claude Max OAuth)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # Optional: GitHub token for git operations
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    networks:
      - linear-agent

  # Tailscale sidecar - exposes linear-webhook publicly via Tailscale Funnel
  tailscale:
    image: tailscale/tailscale:latest
    hostname: ${TAILSCALE_HOSTNAME:-linear-agent}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_USERSPACE=false
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./tailscale-serve.json:/config/serve.json:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      - linear-agent

volumes:
  linear-data:
  worktrees:
  tailscale-state:
  opencode-data:

networks:
  linear-agent:
    driver: bridge
