services:
  # Linear webhook server - handles OAuth and webhooks from Linear
  linear-webhook:
    build:
      context: .
      dockerfile: packages/local/Dockerfile
    ports:
      - "3000:3000" # Local access only
    volumes:
      # Mount config file (use config.docker.json for Docker networking)
      - ./config.docker.json:/app/packages/local/config.json:ro
      # Persist data (tokens, sessions)
      - linear-data:/data
      # Mount all repositories from ~/projects - must match opencode container
      - ${REPO_PATH_CYRUS:-~/projects/cyrus}:/workspace/repos/cyrus
      - ${REPO_PATH_LINEAR_AGENT:-~/projects/linear-opencode-agent}:/workspace/repos/linear-opencode-agent
      - ${REPO_PATH_MONEYDB:-~/projects/moneydb}:/workspace/repos/moneydb
      - ${REPO_PATH_OPENCODE:-~/projects/opencode}:/workspace/repos/opencode
      - ${REPO_PATH_RESERVATIONS:-~/projects/reservations}:/workspace/repos/reservations
      - ${REPO_PATH_SST:-~/projects/sst}:/workspace/repos/sst
      - ${REPO_PATH_WEATHER_BOT:-~/projects/weather-bot}:/workspace/repos/weather-bot
      - ${REPO_PATH_WEBSITE:-~/projects/website}:/workspace/repos/website
      # Worktrees directory for session isolation
      - worktrees:/workspace/worktrees
    environment:
      - NODE_ENV=production
    depends_on:
      - opencode
    networks:
      - linear-agent

  # OpenCode server - AI coding agent
  # NOT exposed publicly - only accessible within Docker network
  # For local debugging, use: docker compose exec opencode opencode --remote http://localhost:4096
  #
  # Option 1 (recommended): Build from ~/environment Nix flake:
  #   cd ~/environment && nix build .#sandbox && docker load < result
  #   Then set OPENCODE_IMAGE=opencode-sandbox:latest in .env
  #
  # Option 2: Build from Dockerfile (fallback):
  #   Uses ./docker/opencode/Dockerfile
  opencode:
    image: ${OPENCODE_IMAGE:-}
    build:
      context: ./docker/opencode
      dockerfile: Dockerfile
    # No ports exposed to host - internal only for security
    # The linear-webhook container accesses it via http://opencode:4096
    volumes:
      # Mount worktrees at same path as linear-webhook for consistency
      - worktrees:/workspace/worktrees
      # Mount all repositories from ~/projects
      - ${REPO_PATH_CYRUS:-~/projects/cyrus}:/workspace/repos/cyrus
      - ${REPO_PATH_LINEAR_AGENT:-~/projects/linear-opencode-agent}:/workspace/repos/linear-opencode-agent
      - ${REPO_PATH_MONEYDB:-~/projects/moneydb}:/workspace/repos/moneydb
      - ${REPO_PATH_OPENCODE:-~/projects/opencode}:/workspace/repos/opencode
      - ${REPO_PATH_RESERVATIONS:-~/projects/reservations}:/workspace/repos/reservations
      - ${REPO_PATH_SST:-~/projects/sst}:/workspace/repos/sst
      - ${REPO_PATH_WEATHER_BOT:-~/projects/weather-bot}:/workspace/repos/weather-bot
      - ${REPO_PATH_WEBSITE:-~/projects/website}:/workspace/repos/website
      # Persistent storage for OpenCode data (logs, sessions, etc.)
      - opencode-data:/root/.local/share/opencode
    environment:
      # Optional: Anthropic API key (not needed if using Claude Max OAuth)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # GitHub token for git operations
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      # Linear API key for MCP server (allows agent to update issues)
      - LINEAR_API_KEY=${LINEAR_API_KEY}
    networks:
      - linear-agent

  # Tailscale sidecar - exposes linear-webhook publicly via Tailscale Funnel
  tailscale:
    image: tailscale/tailscale:latest
    hostname: ${TAILSCALE_HOSTNAME:-linear-agent}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_USERSPACE=false
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./tailscale-serve.json:/config/serve.json:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      - linear-agent

volumes:
  linear-data:
  worktrees:
  tailscale-state:
  opencode-data:

networks:
  linear-agent:
    driver: bridge
