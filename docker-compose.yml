services:
  # Webhook server - handles OAuth, webhooks from Linear, and routes to OpenCode
  # NOTE: Requires OpenCode server running on host via launchd (see ~/environment)
  webhook-server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "127.0.0.1:3000:3000" # Localhost only - not exposed to local network
    volumes:
      # Mount config file
      - ./config.docker.json:/app/packages/server/config.json:ro
      # Persistent data (tokens, sessions) - bind mount for plugin access
      - ~/.local/share/linear-opencode-agent:/data
    environment:
      - NODE_ENV=production
      - LOG_FORMAT=pretty
    extra_hosts:
      # Allow container to reach host's OpenCode server
      - "host.docker.internal:host-gateway"
    networks:
      - linear-agent

  # Cloudflare Tunnel - exposes webhook-server publicly via Cloudflare Tunnel
  # Provides IP allowlisting via Cloudflare Access and DDoS protection
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run linear-webhook
    volumes:
      - ~/.cloudflared:/etc/cloudflared:ro
    depends_on:
      - webhook-server
    networks:
      - linear-agent

networks:
  linear-agent:
    driver: bridge
