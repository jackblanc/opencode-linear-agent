services:
  # Linear webhook server - handles OAuth and webhooks from Linear
  linear-webhook:
    build:
      context: .
      dockerfile: packages/local/Dockerfile
    ports:
      - "3000:3000" # Local access only
    volumes:
      # Mount config file (use config.docker.json for Docker networking)
      - ./config.docker.json:/usr/src/app/packages/local/config.json:ro
      # Mount all repositories from ~/projects (read-write for creating worktrees)
      # This container needs write access to .git/worktrees/ directory
      - ${PROJECTS_DIR:-~/projects}:/home/repos:cached
      # Session worktrees (ephemeral, per-session) - writable for creating worktrees
      - worktrees:/workspace
      # Persistent data (tokens, sessions) - separate path to avoid nested mount issues
      - linear-data:/data
    environment:
      - NODE_ENV=production
      - REPOS_DIR=/home/repos
      - WORKSPACE_DIR=/workspace
    depends_on:
      - opencode
    networks:
      - linear-agent

  # OpenCode server - AI coding agent
  # Port 4096 exposed to localhost only for UI access
  # Extends official OpenCode image with development tools
  opencode:
    build:
      context: ./packages/environment
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:4096:4096" # Localhost only - access OpenCode UI at http://localhost:4096
    volumes:
      # Mount all repositories (read-write for git operations in .git/ directories)
      # File permissions prevent modifying source files (agent runs as non-root user)
      - ${PROJECTS_DIR:-~/projects}:/home/repos:cached
      # Session worktrees (ephemeral, per-session) - shared with webhook server
      - worktrees:/workspace
      # Persistent storage for OpenCode data (auth, logs)
      - opencode-data:/home/user/.local/share/opencode
    environment:
      # Optional: Anthropic API key (not needed if using Claude Max OAuth)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # GitHub token for git operations
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      # Path configuration
      - REPOS_DIR=/home/repos
      - WORKSPACE_DIR=/workspace
    networks:
      - linear-agent
    # Security: Drop all capabilities (container runs as non-root user)
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  # Cloudflare Tunnel - exposes linear-webhook publicly via Cloudflare Tunnel
  # Provides IP allowlisting via Cloudflare Access and DDoS protection
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run linear-webhook
    volumes:
      - ~/.cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ~/.cloudflared/0d2577f8-b7f6-4839-a22a-990529fe9dac.json:/etc/cloudflared/credentials.json:ro
      - ~/.cloudflared/cert.pem:/etc/cloudflared/cert.pem:ro
    networks:
      - linear-agent

volumes:
  linear-data:
  worktrees:
  opencode-data:

networks:
  linear-agent:
    driver: bridge
