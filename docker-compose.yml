services:
  # Linear webhook server - handles OAuth and webhooks from Linear
  linear-webhook:
    build:
      context: .
      dockerfile: packages/local/Dockerfile
    ports:
      - "3000:3000" # Local access only
    volumes:
      # Mount config file (use config.docker.json for Docker networking)
      - ./config.docker.json:/app/packages/local/config.json:ro
      # Persist data (tokens, sessions)
      - linear-data:/data
      # Mount all repositories - paths match /home/user/projects in opencode container
      - ${REPO_PATH_CYRUS:-~/projects/cyrus}:/home/user/projects/cyrus
      - ${REPO_PATH_LINEAR_AGENT:-~/projects/linear-opencode-agent}:/home/user/projects/linear-opencode-agent
      - ${REPO_PATH_MONEYDB:-~/projects/moneydb}:/home/user/projects/moneydb
      - ${REPO_PATH_OPENCODE:-~/projects/opencode}:/home/user/projects/opencode
      - ${REPO_PATH_RESERVATIONS:-~/projects/reservations}:/home/user/projects/reservations
      - ${REPO_PATH_SST:-~/projects/sst}:/home/user/projects/sst
      - ${REPO_PATH_WEATHER_BOT:-~/projects/weather-bot}:/home/user/projects/weather-bot
      - ${REPO_PATH_WEBSITE:-~/projects/website}:/home/user/projects/website
      # Worktrees directory for session isolation
      - worktrees:/home/user/worktrees
    environment:
      - NODE_ENV=production
    depends_on:
      - opencode
    networks:
      - linear-agent

  # OpenCode server - AI coding agent
  # Port 4096 exposed to localhost only for UI access
  # Uses pre-built environment image from GHCR (requires docker login ghcr.io)
  opencode:
    image: ghcr.io/jackblanc/environment:main-personal-linux
    ports:
      - "127.0.0.1:4096:4096" # Localhost only - access OpenCode UI at http://localhost:4096
    volumes:
      # Mount worktrees - paths match between containers
      - worktrees:/home/user/worktrees
      # Mount all repositories from ~/projects to /home/user/projects
      - ${REPO_PATH_CYRUS:-~/projects/cyrus}:/home/user/projects/cyrus
      - ${REPO_PATH_LINEAR_AGENT:-~/projects/linear-opencode-agent}:/home/user/projects/linear-opencode-agent
      - ${REPO_PATH_MONEYDB:-~/projects/moneydb}:/home/user/projects/moneydb
      - ${REPO_PATH_OPENCODE:-~/projects/opencode}:/home/user/projects/opencode
      - ${REPO_PATH_RESERVATIONS:-~/projects/reservations}:/home/user/projects/reservations
      - ${REPO_PATH_SST:-~/projects/sst}:/home/user/projects/sst
      - ${REPO_PATH_WEATHER_BOT:-~/projects/weather-bot}:/home/user/projects/weather-bot
      - ${REPO_PATH_WEBSITE:-~/projects/website}:/home/user/projects/website
      # Persistent storage for OpenCode data (logs, sessions, etc.)
      - opencode-data:/home/user/.local/share/opencode
      # Mount linear-opencode-agent specific config files
      - ./docker/opencode/opencode.json:/home/user/.config/opencode/opencode.json:ro
      - ./docker/opencode/AGENTS.md:/home/user/AGENTS.md:ro
      - ./docker/opencode/plugin:/home/user/.config/opencode/plugin:ro
    environment:
      # Optional: Anthropic API key (not needed if using Claude Max OAuth)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # GitHub token for git operations
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    networks:
      - linear-agent

  # Cloudflare Tunnel - exposes linear-webhook publicly via Cloudflare Tunnel
  # Provides IP allowlisting via Cloudflare Access and DDoS protection
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run linear-webhook
    volumes:
      - ~/.cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ~/.cloudflared/0d2577f8-b7f6-4839-a22a-990529fe9dac.json:/etc/cloudflared/credentials.json:ro
      - ~/.cloudflared/cert.pem:/etc/cloudflared/cert.pem:ro
    networks:
      - linear-agent

volumes:
  linear-data:
  worktrees:
  opencode-data:

networks:
  linear-agent:
    driver: bridge
