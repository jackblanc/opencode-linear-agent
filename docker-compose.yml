services:
  # Webhook server - handles OAuth, webhooks from Linear, and routes to OpenCode
  webhook-server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - "3000:3000" # Local access only
    volumes:
      # Mount config file
      - ./config.docker.json:/app/packages/server/config.json:ro
      # Mount repos for discovery (read-only)
      - ${PROJECTS_DIR:-~/projects}:/home/repos:ro
      # Persistent data (tokens, sessions)
      - server-data:/data
    environment:
      - NODE_ENV=production
      - LOG_FORMAT=pretty
      - OPENCODE_URL=http://opencode:4096
    depends_on:
      - opencode
    networks:
      - linear-agent

  # OpenCode server - AI coding agent with native worktree management
  opencode:
    # image: ghcr.io/jackblanc/opencode-environment:latest
    build: packages/opencode
    ports:
      - "127.0.0.1:4096:4096" # Localhost only - access OpenCode UI
    volumes:
      # Mount repositories (read-write for git operations)
      - ${PROJECTS_DIR:-~/projects}:/home/repos:cached
      # Persistent storage for OpenCode data (auth, logs, worktrees)
      - opencode-data:/home/user/.local/share/opencode
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    networks:
      - linear-agent

  # Cloudflare Tunnel - exposes webhook-server publicly via Cloudflare Tunnel
  # Provides IP allowlisting via Cloudflare Access and DDoS protection
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run linear-webhook
    volumes:
      - ~/.cloudflared:/etc/cloudflared:ro
    depends_on:
      - webhook-server
    networks:
      - linear-agent

volumes:
  server-data:
  opencode-data:

networks:
  linear-agent:
    driver: bridge
