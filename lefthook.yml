# Lefthook configuration for pre-commit hooks
# https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  jobs:
    - name: typecheck
      run: bun run typecheck

    - name: lint
      run: bun run lint:check

    - name: format
      run: bun run format:check

    - name: knip
      run: bun run knip

    - name: test
      run: bun test
